# Mendix custom rule: Use 'click' not 'click on'
# Reference: content/en/docs/community-tools/contribute-to-mendix-docs/style-guide/terminology.md (click)
extends: substitution
message: "Use '%s' instead of '%s'"
link: https://docs.mendix.com/community-tools/contribute-to-mendix-docs/style-guide/terminology/#click
level: warning
ignorecase: true
scope:
  - paragraph
  - heading
  - list
  - table
  - blockquote
action:
  name: replace
swap:
  'click on': 'click'
  'clicking on': 'clicking'
  'clicked on': 'clicked'
  'clicks on': 'clicks'
